services:
  - type: web
    name: line-faq-bot
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      gunicorn app:app

    envVars:
      - key: CHANNEL_ACCESS_TOKEN
        sync: false

      - key: CHANNEL_SECRET
        sync: false

      - key: GOOGLE_SHEET_ID
        sync: false
